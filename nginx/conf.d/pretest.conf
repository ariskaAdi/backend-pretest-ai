# ── Rate limit zones ─────────────────────────────────────────────────────────
# general  : 20 req/detik per IP  → halaman & API biasa
# auth     : 5 req/menit per IP   → login, register, OTP
# upload   : 3 req/menit per IP   → upload PDF

limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m  rate=3r/m;

# ── HTTP — redirect ke HTTPS + ACME challenge untuk certbot ──────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options      "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy      "strict-origin-when-cross-origin" always;

    # ── Auth — 5 req/menit, cocok untuk login & OTP ───────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Upload PDF — 3 req/menit, max 25MB ───────────────────────────────────
    location /api/v1/modules {
        limit_req zone=upload burst=2 nodelay;
        limit_req_status 429;

        client_max_body_size 25M;
        proxy_read_timeout   120s;
        proxy_pass           http://backend:8080;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
    }

    # ── Webhook Lynk.id — tanpa rate limit (sudah ada secret validation) ─────
    location /api/v1/webhook/ {
        proxy_pass       http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API lainnya — 20 req/detik ────────────────────────────────────────────
    location /api/ {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass       http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend — semua route lainnya ────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass            http://frontend:3000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        'upgrade';
        proxy_cache_bypass    $http_upgrade;
    }
}
